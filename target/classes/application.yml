server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/simple_library
    username: tester
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true